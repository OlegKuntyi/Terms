<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MedTerms — Passwort zurückgesetzt</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',system-ui,sans-serif;background:#F7F9FC;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border-radius:16px;max-width:480px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08);overflow:hidden}
.header{background:linear-gradient(135deg,#78B5FA,#9586FD);padding:32px 24px 20px;text-align:center}
.header h1{color:#fff;font-size:26px;font-weight:700;letter-spacing:1px}
.header p{color:rgba(255,255,255,.85);font-size:13px;margin-top:6px}
.body{padding:32px 28px;text-align:center}
.icon{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#78B5FA,#9586FD);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.icon svg{width:36px;height:36px;fill:#fff}
.body h2{color:#242833;font-size:22px;font-weight:700;margin-bottom:8px}
.body .msg{color:#7E8494;font-size:15px;line-height:1.6;margin-bottom:24px}
.btn{display:inline-block;background:linear-gradient(135deg,#78B5FA,#9586FD);color:#fff;font-size:16px;font-weight:600;text-decoration:none;padding:14px 36px;border-radius:22px;box-shadow:0 4px 16px rgba(125,162,255,.3);transition:transform .15s}
.btn:hover{transform:translateY(-1px)}
.footer{padding:20px 28px;border-top:1px solid #E4E9F5;text-align:center}
.footer p{font-size:12px;color:#959FBA}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>MedTerms</h1>
    <p>Medizinische Fachbegriffe meistern</p>
  </div>
  <div class="body">
    <div class="icon"><svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/></svg></div>
    <h2 id="title">Passwort erfolgreich zurückgesetzt!</h2>
    <p class="msg" id="msg">Ihr Passwort wurde geändert. Sie können sich jetzt mit dem neuen Passwort anmelden.</p>
    <a href="medterms://login" class="btn" id="btn">App öffnen</a>
  </div>
  <div class="footer">
    <p>© 2026 GermanMove Education</p>
  </div>
</div>
<script>
const T={
de:{title:'Passwort erfolgreich zurückgesetzt!',msg:'Ihr Passwort wurde geändert. Sie können sich jetzt mit dem neuen Passwort anmelden.',btn:'App öffnen'},
en:{title:'Password successfully reset!',msg:'Your password has been changed. You can now sign in with your new password.',btn:'Open App'},
uk:{title:'Пароль успішно скинуто!',msg:'Ваш пароль змінено. Тепер ви можете увійти з новим паролем.',btn:'Відкрити додаток'},
ru:{title:'Пароль успешно сброшен!',msg:'Ваш пароль изменён. Теперь вы можете войти с новым паролем.',btn:'Открыть приложение'},
tr:{title:'Şifre başarıyla sıfırlandı!',msg:'Şifreniz değiştirildi. Artık yeni şifrenizle giriş yapabilirsiniz.',btn:'Uygulamayı aç'},
ar:{title:'تم إعادة تعيين كلمة المرور بنجاح!',msg:'تم تغيير كلمة المرور. يمكنك الآن تسجيل الدخول بكلمة المرور الجديدة.',btn:'افتح التطبيق'},
fr:{title:'Mot de passe réinitialisé !',msg:'Votre mot de passe a été modifié. Connectez-vous avec votre nouveau mot de passe.',btn:'Ouvrir l\'app'},
es:{title:'¡Contraseña restablecida!',msg:'Su contraseña ha sido cambiada. Inicie sesión con su nueva contraseña.',btn:'Abrir la app'},
pl:{title:'Hasło zresetowane!',msg:'Twoje hasło zostało zmienione. Zaloguj się nowym hasłem.',btn:'Otwórz aplikację'},
el:{title:'Ο κωδικός επαναφέρθηκε!',msg:'Ο κωδικός σας άλλαξε. Μπορείτε να συνδεθείτε με τον νέο κωδικό.',btn:'Άνοιγμα εφαρμογής'},
ro:{title:'Parola a fost resetată!',msg:'Parola dvs. a fost schimbată. Vă puteți conecta cu noua parolă.',btn:'Deschide aplicația'}
};
const lang=(navigator.language||'de').slice(0,2).toLowerCase();
const t=T[lang]||T.de;
document.getElementById('title').textContent=t.title;
document.getElementById('msg').textContent=t.msg;
document.getElementById('btn').textContent=t.btn;
if(lang==='ar')document.body.style.direction='rtl';
</script>
</body>
</html>
